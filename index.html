<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>와이즈업 공지사항</title>
    <meta name="description" content="와이즈업 학원 학부모 공지사항 페이지입니다.">

    <!-- Pretendard 폰트 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">

    <!-- 기본 스타일 -->
    <style>
        :root {
            --primary: #0084d1;
            --primary-dark: #005fa3;
            --accent: #f4d05d;
            --text: #3d3d3d;
            --text-sub: #94a3b8;
            --bg: #f4f6f8;
            --font: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            -webkit-text-size-adjust: 100%;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* 헤더 - BI 스타일 */
        .header {
            background: #ffffff;
            padding: 20px 24px;
            text-align: center;
            border-bottom: 3px solid var(--primary);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .brand {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .brand-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .brand-title {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--primary);
            letter-spacing: -0.02em;
        }

        .brand-title span {
            color: var(--accent);
        }

        /* 드롭다운 */
        .selector {
            padding: 16px 20px;
            background: #ffffff;
            border-bottom: 1px solid #e2ebf0;
        }

        .select-wrap {
            position: relative;
            max-width: 600px;
            margin: 0 auto;
        }

        .notice-select {
            width: 100%;
            padding: 14px 44px 14px 16px;
            font-size: 0.95rem;
            font-family: var(--font);
            font-weight: 600;
            color: var(--text);
            background: var(--bg);
            border: 2px solid #e2ebf0;
            border-radius: 12px;
            appearance: none;
            -webkit-appearance: none;
            cursor: pointer;
            outline: none;
            transition: border-color 0.2s;
        }

        .notice-select:focus {
            border-color: var(--primary);
        }

        .select-arrow {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
            color: var(--primary);
        }

        /* 뷰어 */
        .viewer {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .viewer-meta {
            padding: 10px 20px;
            background: #f8fafc;
            border-bottom: 1px solid #e2ebf0;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.8rem;
        }

        .badge {
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 700;
        }

        .badge-new {
            background: var(--accent);
            color: var(--text);
        }

        .badge-normal {
            background: #e2ebf0;
            color: var(--text-sub);
        }

        .badge-important {
            background: #fee2e2;
            color: #ef4444;
        }

        .date {
            color: var(--text-sub);
            font-weight: 500;
        }

        .notice-iframe {
            flex: 1;
            width: 100%;
            min-height: calc(100vh - 160px);
            border: none;
            background: #ffffff;
        }

        /* 빈 상태 */
        .empty {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 24px;
            color: var(--text-sub);
            text-align: center;
        }

        .empty-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text);
            margin: 16px 0 6px;
        }

        .empty-desc {
            font-size: 0.875rem;
        }
    </style>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
</head>

<body>

    <!-- 헤더 -->
    <header class="header">
        <div class="brand">
            <div class="brand-icon">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                    <path d="M12 3L4 11H9V21H15V11H20L12 3Z" fill="#ffffff" />
                    <circle cx="12" cy="14" r="2" fill="#f4d05d" />
                </svg>
            </div>
            <h1 class="brand-title">WISE<span>UP</span> 공지사항</h1>
        </div>
    </header>

    <!-- 드롭다운 -->
    <div class="selector">
        <div class="select-wrap">
            <select id="noticeSelect" class="notice-select">
                <option value="">불러오는 중...</option>
            </select>
            <div class="select-arrow">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="6 9 12 15 18 9"></polyline>
                </svg>
            </div>
        </div>
    </div>

    <!-- 뷰어 -->
    <div class="viewer">
        <div id="viewerHeader" class="viewer-meta" style="display:none;">
            <span id="viewerBadge" class="badge"></span>
            <span id="viewerDate" class="date"></span>
        </div>
        <div id="noticeViewer" class="viewer">
            <!-- app.js가 iframe 렌더링 -->
        </div>
    </div>

    <script src="./firebase-config.js"></script>
    <script src="./app.js"></script>
</body>

</html>
